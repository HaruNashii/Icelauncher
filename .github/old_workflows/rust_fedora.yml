name: Rust - Fedora

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:

  check:
    name: Check (Fedora)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: fedora-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: fedora-cargo-

      - name: Build
        uses: gbraad-actions/fedora-action@main
        with:
          dnf-packages: cargo clippy liburing-devel rust-pkg-config-devel openssl-devel openssl rust-openssl-devel fontconfig rust-yeslogic-fontconfig-sys-devel pkgconf-pkg-config gcc git-core make cmake alsa-lib-devel pulseaudio-libs-devel pipewire-devel libX11-devel libXext-devel libXrandr-devel libXcursor-devel libXfixes-devel libXi-devel libXScrnSaver-devel dbus-devel ibus-devel systemd-devel mesa-libGL-devel libxkbcommon-devel mesa-libGLES-devel mesa-libEGL-devel vulkan-devel wayland-devel wayland-protocols-devel libdrm-devel mesa-libgbm-devel libusb1-devel libdecor-devel pipewire-jack-audio-connection-kit-devel
          run: cargo build
        env:
          RUSTFLAGS: "-D warnings"

  test:
    name: Test (Fedora)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: fedora-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: fedora-cargo-

      - name: Run tests (debug + release)
        uses: gbraad-actions/fedora-action@main
        with:
          dnf-packages: cargo clippy liburing-devel rust-pkg-config-devel openssl-devel openssl rust-openssl-devel fontconfig rust-yeslogic-fontconfig-sys-devel pkgconf-pkg-config gcc git-core make cmake alsa-lib-devel pulseaudio-libs-devel pipewire-devel libX11-devel libXext-devel libXrandr-devel libXcursor-devel libXfixes-devel libXi-devel libXScrnSaver-devel dbus-devel ibus-devel systemd-devel mesa-libGL-devel libxkbcommon-devel mesa-libGLES-devel mesa-libEGL-devel vulkan-devel wayland-devel wayland-protocols-devel libdrm-devel mesa-libgbm-devel libusb1-devel libdecor-devel pipewire-jack-audio-connection-kit-devel
          run: |
            cargo test
            cargo test --release

  lint:
    name: Lint (Fedora)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: fedora-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: fedora-cargo-

      - name: Clippy + audit + udeps
        uses: gbraad-actions/fedora-action@main
        with:
          dnf-packages: cargo clippy liburing-devel rust-pkg-config-devel openssl-devel openssl rust-openssl-devel fontconfig rust-yeslogic-fontconfig-sys-devel pkgconf-pkg-config gcc git-core make cmake alsa-lib-devel pulseaudio-libs-devel pipewire-devel libX11-devel libXext-devel libXrandr-devel libXcursor-devel libXfixes-devel libXi-devel libXScrnSaver-devel dbus-devel ibus-devel systemd-devel mesa-libGL-devel libxkbcommon-devel mesa-libGLES-devel mesa-libEGL-devel vulkan-devel wayland-devel wayland-protocols-devel libdrm-devel mesa-libgbm-devel libusb1-devel libdecor-devel pipewire-jack-audio-connection-kit-devel
          run: |
            cargo clippy -- -D warnings
            cargo install cargo-audit --locked
            cargo audit
            rustup toolchain install nightly --profile minimal
            cargo install cargo-udeps --locked
            cargo +nightly udeps

